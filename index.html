<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PhoneAssets">
<link rel="icon" type="image/svg+xml" href="logo.svg">
<title>Assets In My Phone</title>
<style>
/* ===== RESET & VARS ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #111;
  --bg-card: #1a1a1a;
  --bg-elevated: #222;
  --border: rgba(255,255,255,0.06);
  --gold: #c8a877;
  --gold-dim: #8a7256;
  --text: #ddd;
  --text-dim: #888;
  --text-muted: #555;
  --red: #c47a6b;
  --green: #7a9e7e;
  --blue: #7a8f9e;
  --radius: 12px;
  --radius-lg: 18px;
  --safe-bottom: env(safe-area-inset-bottom, 16px);
  --font: -apple-system, "PingFang SC", "Heiti SC", "STHeiti", "Microsoft YaHei", sans-serif;
}

html {
  font-size: 16px;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow-x: hidden;
}

body {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: calc(var(--safe-bottom) + 100px);
}

/* ===== APP SHELL ===== */
.app {
  width: 100%;
  max-width: 480px;
  padding: 0 18px;
}

/* ===== HEADER ===== */
.header {
  padding: 40px 0 4px;
}

.header-title {
  font-size: 1.5rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.01em;
}

/* ===== TOTAL CARD ===== */
.total-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  margin: 12px 0 16px;
}

.total-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}

.total-label {
  font-size: 0.78rem;
  color: var(--text-dim);
}

.total-amount {
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--gold);
}

.total-amount::before {
  content: '¥';
  font-size: 1rem;
  font-weight: 400;
  color: var(--gold-dim);
  margin-right: 2px;
}

.total-daily {
  font-size: 0.85rem;
  color: var(--green);
  margin-top: 2px;
}

.total-meta {
  display: flex;
  gap: 20px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.total-meta-item {
  display: flex;
  flex-direction: column;
}
.total-meta-label { font-size: 0.65rem; color: var(--text-muted); }
.total-meta-value { font-size: 0.9rem; color: var(--text); margin-top: 1px; }

/* ===== SYNC ===== */
.sync-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.sync-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  background: var(--text-muted); transition: background 0.3s;
}
.sync-dot.synced { background: var(--green); }
.sync-dot.syncing { background: var(--gold); animation: pulse 1s ease-in-out infinite; }
.sync-dot.error { background: var(--red); }
@keyframes pulse {
  0%,100%{opacity:1} 50%{opacity:.3}
}
.sync-text { font-size: 0.68rem; color: var(--text-muted); }
.sync-recovery { font-size: 0.68rem; color: var(--gold-dim); cursor: pointer; margin-left: auto; }

/* ===== CATEGORY ===== */
.category-group { margin-bottom: 24px; }

.category-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2px 8px; cursor: pointer; user-select: none;
}
.category-name-row { display: flex; align-items: center; gap: 8px; }
.category-icon {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; background: rgba(255,255,255,0.04);
}
.category-name { font-size: 0.95rem; font-weight: 600; color: var(--text); }
.category-count { font-size: 0.65rem; color: var(--text-muted); margin-left: 2px; }
.category-meta { text-align: right; }
.category-subtotal { font-size: 0.85rem; color: var(--gold-dim); }
.category-subtotal::before { content: '¥'; font-size: 0.65rem; }
.category-daily { font-size: 0.68rem; color: var(--green); margin-top: 1px; }

.category-items { display: flex; flex-direction: column; gap: 6px; }

/* ===== ASSET CARD ===== */
.asset-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  position: relative; cursor: pointer;
  transition: border-color 0.2s, background 0.2s; overflow: hidden;
}
.asset-card:active { background: var(--bg-elevated); border-color: rgba(255,255,255,0.1); }

.asset-card-inner { display: flex; align-items: center; justify-content: space-between; }
.asset-info { flex: 1; min-width: 0; }
.asset-name {
  font-size: 0.9rem; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.asset-meta-row { display: flex; align-items: center; gap: 8px; margin-top: 3px; }
.asset-date { font-size: 0.65rem; color: var(--text-muted); }
.asset-duration { font-size: 0.65rem; color: var(--blue); }
.asset-per-day { font-size: 0.82rem; font-weight: 500; color: var(--green); margin-left: auto; }

.asset-price {
  font-size: 1rem; font-weight: 600; color: var(--gold);
  flex-shrink: 0; margin-left: 12px;
}
.asset-price::before { content: '¥'; font-size: 0.65rem; color: var(--gold-dim); }

/* ===== ACTIONS ===== */
.asset-actions {
  position: absolute; top: 6px; right: 6px; display: flex; gap: 4px;
  opacity: 0; transition: opacity 0.2s;
}
.asset-card:hover .asset-actions,
.asset-card:focus-within .asset-actions { opacity: 1; }

.btn-icon {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1); background: var(--bg-elevated);
  color: var(--text-dim); font-size: 0.7rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.btn-icon:active { background: rgba(200,168,119,0.2); color: var(--gold); }
.btn-icon.danger:active { background: rgba(196,122,107,0.2); color: var(--red); }

/* ===== FAB ===== */
.fab {
  position: fixed; bottom: calc(var(--safe-bottom) + 24px); right: 24px;
  width: 52px; height: 52px; border-radius: 50%;
  background: #fff; border: none; color: #111; font-size: 1.5rem;
  cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; transition: transform 0.2s; -webkit-tap-highlight-color: transparent;
}
.fab:active { transform: scale(0.94); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  z-index: 200; display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn 0.25s ease;
}
.modal-sheet {
  background: #1a1a1a; border: 1px solid rgba(255,255,255,0.06);
  border-bottom: none; border-radius: 18px 18px 0 0;
  width: 100%; max-width: 480px; max-height: 88dvh; overflow-y: auto;
  padding: 24px 20px calc(var(--safe-bottom) + 16px);
  animation: slideUp 0.35s cubic-bezier(0.22,0.61,0.36,1);
  box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
}
.modal-handle { width: 32px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-size: 1.15rem; font-weight: 700; color: #fff; margin-bottom: 20px; }

/* ===== FORM ===== */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 4px; }
.form-input, .form-select {
  width: 100%; padding: 10px 14px; background: #111; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 0.9rem;
  transition: border-color 0.2s; -webkit-appearance: none; appearance: none; outline: none;
}
.form-input:focus, .form-select:focus { border-color: rgba(255,255,255,0.25); }
.form-input::placeholder { color: var(--text-muted); }
.form-select {
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23888' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 14px center; padding-right: 36px; cursor: pointer;
}
.form-select option { background: #111; color: var(--text); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.cat-add-row { display: flex; gap: 8px; margin-top: 6px; }
.cat-add-row .form-input { flex: 1; font-size: 0.82rem; padding: 8px 12px; }

/* ===== BUTTONS ===== */
.form-actions { display: flex; gap: 8px; margin-top: 22px; }
.btn {
  flex: 1; padding: 12px 16px; border-radius: 8px; font-size: 0.85rem;
  font-weight: 600; cursor: pointer; border: none;
  transition: all 0.2s; -webkit-tap-highlight-color: transparent;
  font-family: var(--font);
}
.btn-primary { background: #fff; color: #111; }
.btn-primary:active { opacity: 0.85; transform: scale(0.97); }
.btn-secondary { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: var(--text-dim); }
.btn-secondary:active { background: rgba(255,255,255,0.04); }
.btn-danger { background: transparent; border: 1px solid rgba(196,122,107,0.2); color: var(--red); font-size: 0.78rem; }
.btn-danger:active { background: rgba(196,122,107,0.1); }
.btn-small { flex: 0; padding: 8px 14px; font-size: 0.75rem; border-radius: 6px; }

/* ===== EMPTY ===== */
.empty-state { text-align: center; padding: 60px 20px; }
.empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
.empty-title { font-size: 1rem; color: var(--text-dim); margin-bottom: 6px; }
.empty-desc { font-size: 0.78rem; color: var(--text-muted); line-height: 1.6; }

/* ===== ANIMATIONS ===== */
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes cardIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.asset-card { animation: cardIn 0.35s ease backwards; }

/* ===== RECOVERY ===== */
.recovery-icon { font-size: 2.5rem; text-align: center; margin-bottom: 10px; }
.recovery-code {
  font-size: 1.2rem; color: var(--gold); text-align: center; letter-spacing: 0.1em;
  padding: 12px; background: #111; border-radius: 10px; border: 1px dashed rgba(200,168,119,0.2);
  margin: 12px 0; user-select: all; word-break: break-all;
}
.recovery-hint { font-size: 0.72rem; color: var(--text-dim); text-align: center; line-height: 1.6; margin-bottom: 16px; }
.recovery-input {
  width: 100%; padding: 10px 14px; background: #111; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; color: var(--text); font-size: 0.9rem; text-align: center;
  letter-spacing: 0.06em; outline: none; font-family: var(--font);
}
.recovery-input:focus { border-color: rgba(200,168,119,0.4); }
.recovery-input::placeholder { color: var(--text-muted); font-size: 0.8rem; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

.toast {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 8px 18px; border-radius: 20px;
  font-size: 0.78rem; z-index: 300; font-family: var(--font); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  animation: fadeIn 0.2s ease; pointer-events: none;
}

@media (min-width: 481px) {
  .header { padding-top: 48px; }
  .asset-card:hover { border-color: rgba(255,255,255,0.1); background: var(--bg-elevated); }
}
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <h1 class="header-title">Assets In My Phone</h1>
  </header>

  <div class="total-card">
    <div class="total-row">
      <div>
        <div class="total-label">总资产</div>
        <div class="total-amount" id="totalAmount">0</div>
        <div class="total-daily" id="totalDaily"></div>
      </div>
      <div style="text-align:right">
        <div class="total-meta-item"><span class="total-meta-label">物品</span><span class="total-meta-value" id="totalCount">0</span></div>
        <div class="total-meta-item"><span class="total-meta-label">品类</span><span class="total-meta-value" id="totalCategories">0</span></div>
      </div>
    </div>
    <div class="sync-row">
      <span class="sync-dot" id="syncDot"></span>
      <span class="sync-text" id="syncText">本机存储</span>
      <span class="sync-recovery" id="syncRecovery" onclick="showRecoveryInfo()" style="display:none">恢复码 ›</span>
    </div>
  </div>

  <div id="recoveryModalContainer"></div>
  <div id="categoryList"></div>

  <div class="empty-state" id="emptyState">
    <div class="empty-icon">·</div>
    <div class="empty-title">还没有记录任何物品</div>
    <div class="empty-desc">点击右下角 + 开始记录</div>
  </div>
</div>

<button class="fab" id="fabBtn">+</button>

<div id="modalContainer"></div>
<div id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<script>
// ===== SUPABASE =====
const SB_URL = 'https://pqdrdpidyxxbwphstdpz.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxZHJkcGlkeXh4YndwaHN0ZHB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NDY2MTQsImV4cCI6MjA5NjIyMjYxNH0.Z5AfS0ZOIJ4b_WNG81YYvl5jegP2Y4kEuOo2XUqn8Wc';
let sb = null;
try { sb = window.supabase.createClient(SB_URL, SB_KEY); } catch(e) {}

// ===== DATA =====
const DEFAULT_CATEGORIES = ['💻 数码', '📷 摄影', '🛋️ 家居', '👔 服饰', '🚗 出行', '📦 其他'];
const CAT_ICONS = { '数码':'💻', '摄影':'📷', '家居':'🛋️', '服饰':'👔', '出行':'🚗', '其他':'📦' };
const SK = 'pa_data', UK = 'pa_uid';

let assets = [], editingId = null, customCats = [];

function loadCats() { try { customCats = JSON.parse(localStorage.getItem('pa_cats') || '[]'); } catch { customCats = []; } }
function saveCats() { localStorage.setItem('pa_cats', JSON.stringify(customCats)); }
function allCats() { return [...DEFAULT_CATEGORIES, ...customCats]; }
function catIcon(name) { return CAT_ICONS[name] || '📦'; }

// ===== UID =====
function uid() {
  let u = localStorage.getItem(UK);
  if (!u) { u = 'PA-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).slice(2,6).toUpperCase(); localStorage.setItem(UK, u); }
  return u;
}

// ===== STORAGE =====
function load() {
  try { assets = JSON.parse(localStorage.getItem(SK) || '[]'); } catch { assets = []; }
}
function save() { localStorage.setItem(SK, JSON.stringify(assets)); sync(); }
function saveSilent() { localStorage.setItem(SK, JSON.stringify(assets)); }

// ===== SYNC =====
async function sync() {
  const u = localStorage.getItem(UK);
  if (!u || !sb) return;
  ss('syncing','同步中...');
  try {
    const { error } = await sb.from('workspaces').upsert({ id: `phoneassets-${u}`, name:'PhoneAssets', data:assets, created_at: new Date().toISOString() });
    if (error) throw error;
    ss('synced','已同步');
  } catch { ss('error','同步失败'); }
}
async function loadRemote(u) {
  if (!sb) return null;
  try { const { data, error } = await sb.from('workspaces').select('data').eq('id',`phoneassets-${u}`).single(); if (error) return null; return data?.data||[]; } catch { return null; }
}
function ss(s,t) {
  const d=document.getElementById('syncDot'), x=document.getElementById('syncText'), r=document.getElementById('syncRecovery');
  if(d){ d.className='sync-dot '+s; x.textContent=t; if(localStorage.getItem(UK)) r.style.display='inline'; }
}

// ===== RECOVERY =====
function showRecoveryInfo() {
  const u = uid();
  const h = `<div class="modal-overlay" id="ro"><div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">恢复码</div><div class="recovery-icon">🔑</div><div class="recovery-code">${esc(u)}</div><div class="recovery-hint">截图保存。换手机或重装后输入此码恢复数据。</div><div class="form-actions"><button class="btn btn-secondary" onclick="copyCode()">复制</button><button class="btn btn-primary" onclick="document.getElementById('ro').remove()">知道了</button></div></div></div>`;
  document.getElementById('recoveryModalContainer').innerHTML = h;
  document.getElementById('ro').addEventListener('click',function(e){ if(e.target===this) this.remove(); });
}
function copyCode() { navigator.clipboard.writeText(uid()).then(()=>toast('已复制')).catch(()=>toast('请长按手动复制')); }
function showRecoveryInput() {
  const h = `<div class="modal-overlay" id="ro"><div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">找回数据</div><div class="recovery-icon">📥</div><div class="recovery-hint">输入之前保存的恢复码</div><input class="recovery-input" id="ri" type="text" placeholder="PA-XXX-XXX" autocomplete="off" autocorrect="off" autocapitalize="characters"><div class="form-actions" style="margin-top:14px"><button class="btn btn-secondary" onclick="document.getElementById('ro').remove()">取消</button><button class="btn btn-primary" onclick="doRecover()">找回</button></div></div></div>`;
  document.getElementById('recoveryModalContainer').innerHTML = h;
  document.getElementById('ro').addEventListener('click',function(e){ if(e.target===this) this.remove(); });
  setTimeout(()=>document.getElementById('ri')?.focus(),400);
}
async function doRecover() {
  const code = document.getElementById('ri').value.trim().toUpperCase();
  if(!code) return toast('请输入恢复码');
  const d = await loadRemote(code);
  if(!d||!d.length) return toast('未找到数据');
  localStorage.setItem(UK,code); localStorage.setItem(SK,JSON.stringify(d));
  assets=d; document.getElementById('ro').remove(); render();
  ss('synced','已恢复 '+d.length+' 件'); toast('已找回 '+d.length+' 件 ✓');
}

// ===== HELPERS =====
function fmt(n) { return Number(n).toLocaleString('zh-CN',{maximumFractionDigits:0}); }
function durMonths(d) { const s=new Date(d),n=new Date(); return Math.max(0,(n.getFullYear()-s.getFullYear())*12+(n.getMonth()-s.getMonth())); }
function durStr(m) { if(m===0) return '不足1月'; const y=Math.floor(m/12),mo=m%12; if(y===0) return mo+'个月'; if(mo===0) return y+'年'; return y+'年'+mo+'个月'; }
function daysSince(d) { return Math.max(1,Math.floor((new Date()-new Date(d))/(86400000))); }
function cpd(p,d) { return p/daysSince(d); }
function cpdStr(p,d) { const c=cpd(p,d); return c>=1?c.toFixed(1):(c*30).toFixed(1); }
function cpdUnit(p,d) { return cpd(p,d)>=1?'/天':'/月'; }
function catKey(full) { return allCats().includes(full)?full.replace(/^[^\s]+\s/,''):full; }
function today() { return new Date().toISOString().split('T')[0]; }
function dateCN(d) { const x=new Date(d); return x.getFullYear()+'/'+String(x.getMonth()+1).padStart(2,'0')+'/'+String(x.getDate()).padStart(2,'0'); }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ===== RENDER =====
function render() {
  const total = assets.reduce((s,a)=>s+(+a.price||0),0);
  const totalDays = assets.reduce((s,a)=>s+(a.price/cpd(a.price,a.date)||0),0);
  const avgDaily = assets.length>0 ? total/assets.reduce((s,a)=>s+(+a.price||0)/cpdStr(a.price,a.date).length,0) : 0;

  document.getElementById('totalAmount').textContent = fmt(total);
  document.getElementById('totalCount').textContent = assets.length;
  document.getElementById('totalCategories').textContent = new Set(assets.map(a=>catKey(a.category))).size;
  if (assets.length>0) {
    const tcpd = assets.reduce((s,a)=>s+cpd(+a.price||0,a.date),0);
    document.getElementById('totalDaily').textContent = '≈¥'+tcpd.toFixed(1)+'/天';
  } else { document.getElementById('totalDaily').textContent = ''; }
  document.getElementById('emptyState').style.display = assets.length===0?'block':'none';
  renderCategories();
}
function renderCategories() {
  const c = document.getElementById('categoryList');
  const g = {};
  for (const a of assets) { const k=catKey(a.category); if(!g[k]) g[k]=[]; g[k].push(a); }
  const sorted = Object.entries(g).sort(([,x],[,y])=>y.reduce((s,i)=>s+(+i.price||0),0)-x.reduce((s,i)=>s+(+i.price||0),0));
  let h = '';
  for (const [name,items] of sorted) {
    const sub = items.reduce((s,i)=>s+(+i.price||0),0);
    const cDaily = items.reduce((s,i)=>s+cpd(+i.price||0,i.date),0);
    items.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    h += `<div class="category-group"><div class="category-header" onclick="this.nextElementSibling.classList.toggle('collapsed')"><div class="category-name-row"><div class="category-icon">${catIcon(name)}</div><span class="category-name">${esc(name)}</span><span class="category-count">${items.length}件</span></div><div class="category-meta"><div class="category-subtotal">${fmt(sub)}</div><div class="category-daily">≈¥${cDaily.toFixed(1)}/天</div></div></div><div class="category-items">`;
    for (let i=0;i<items.length;i++) {
      const a=items[i];
      h += `<div class="asset-card" style="animation-delay:${i*0.03}s" onclick="edit('${a.id}')"><div class="asset-actions"><button class="btn-icon" onclick="event.stopPropagation();edit('${a.id}')">✎</button><button class="btn-icon danger" onclick="event.stopPropagation();del('${a.id}')">✕</button></div><div class="asset-card-inner"><div class="asset-info"><div class="asset-name">${esc(a.name)}</div><div class="asset-meta-row"><span class="asset-date">${dateCN(a.date)}</span><span class="asset-duration">${durStr(durMonths(a.date))}</span></div></div><div style="text-align:right;flex-shrink:0;margin-left:10px"><div class="asset-price">${fmt(a.price)}</div><div class="asset-per-day">≈¥${cpdStr(a.price,a.date)}${cpdUnit(a.price,a.date)}</div></div></div></div>`;
    }
    h += `</div></div>`;
  }
  c.innerHTML = h;
}

// ===== MODAL =====
function openModal(asset=null) {
  editingId = asset?asset.id:null;
  const isEdit = !!asset;
  const cats = allCats();
  const h = `<div class="modal-overlay" id="mo"><div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">${isEdit?'编辑':'添加物品'}</div><form id="af" onsubmit="submitForm(event)"><div class="form-group"><label class="form-label">名称</label><input class="form-input" type="text" id="in" placeholder="iPhone 16 Pro" value="${esc(asset?.name||'')}" required autocomplete="off"></div><div class="form-row"><div class="form-group"><label class="form-label">价格 ¥</label><input class="form-input" type="number" id="ip" placeholder="0" value="${asset?.price||''}" min="0" step="0.01" required inputmode="decimal"></div><div class="form-group"><label class="form-label">购买日期</label><input class="form-input" type="date" id="id" value="${asset?.date||today()}" required></div></div><div class="form-group"><label class="form-label">分类</label><select class="form-select" id="ic">${cats.map(k=>`<option value="${esc(k)}"${(asset&&(asset.category===k||catKey(asset.category)===catKey(k)))?' selected':''}>${k}</option>`).join('')}</select><div class="cat-add-row"><input class="form-input" type="text" id="newCat" placeholder="自定义分类..." autocomplete="off"><button type="button" class="btn btn-small btn-secondary" onclick="addCat()">+ 新增</button></div></div><div class="form-actions">${isEdit?`<button type="button" class="btn btn-danger" onclick="del('${asset.id}')">删除</button>`:''}<button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary">${isEdit?'保存':'添加'}</button></div></form></div></div>`;
  document.getElementById('modalContainer').innerHTML = h;
  document.getElementById('mo').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
  setTimeout(()=>document.getElementById('in')?.focus(),400);
}
function closeModal() { document.getElementById('modalContainer').innerHTML=''; editingId=null; }
function addCat() {
  const inp = document.getElementById('newCat');
  const name = inp.value.trim();
  if(!name) return;
  const full = '📦 '+name;
  if (allCats().includes(full)) { toast('已存在'); return; }
  customCats.push(full); saveCats();
  const sel = document.getElementById('ic');
  sel.innerHTML += `<option value="${esc(full)}">${esc(full)}</option>`;
  sel.value = full;
  inp.value = '';
  CAT_ICONS[name] = '📦';
  toast('已添加');
}

// ===== CRUD =====
function submitForm(e) {
  e.preventDefault();
  const name = document.getElementById('in').value.trim();
  const price = parseFloat(document.getElementById('ip').value)||0;
  const date = document.getElementById('id').value;
  const category = document.getElementById('ic').value;
  if(!name||price<0||!date) return;
  if(editingId) {
    const i = assets.findIndex(a=>a.id===editingId);
    if(i!==-1) assets[i] = {...assets[i],name,price,date,category};
    toast('已更新 ✓');
  } else {
    assets.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,8),name,price,date,category});
    toast('已添加 ✓');
  }
  save(); closeModal(); render();
}
function edit(id) { const a=assets.find(x=>x.id===id); if(a) openModal(a); }
function del(id) {
  const a=assets.find(x=>x.id===id);
  if(!a) return;
  if(confirm(`删除「${a.name}」？`)) { assets=assets.filter(x=>x.id!==id); save(); closeModal(); render(); toast('已删除'); }
}
function toast(m) {
  const c=document.getElementById('toastContainer');
  const e=document.createElement('div'); e.className='toast'; e.textContent=m; c.appendChild(e);
  setTimeout(()=>{ e.style.opacity='0'; e.style.transition='opacity 0.3s'; setTimeout(()=>e.remove(),300); },1600);
}

// ===== PWA =====
function rSW() {
  if(!('serviceWorker' in navigator)) return;
  const code = `const C='pa-v3';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['/'])).then(()=>self.skipWaiting()))});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==C).map(x=>caches.delete(x)))).then(()=>self.clients.claim()))});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).then(r=>{if(r.ok){const c=r.clone();caches.open(C).then(ca=>ca.put(e.request,c));}return r;}).catch(()=>caches.match(e.request).then(c=>c||new Response('Offline',{status:503}))))});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([code],{type:'application/javascript'}))).catch(()=>{});
}
function sM() {
  const m = {name:'PhoneAssets',short_name:'PhoneAssets',description:'Assets In My Phone',start_url:'.',display:'standalone',orientation:'portrait',background_color:'#111',theme_color:'#111',icons:[{src:'logo.svg',sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'}]};
  const l = document.createElement('link'); l.rel='manifest';
  l.href = URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}));
  document.head.appendChild(l);
}

// ===== INIT =====
async function init() {
  sM(); rSW(); loadCats(); load();
  const u = uid();
  if (assets.length>0) { render(); ss('syncing','同步中...'); sync(); }
  else {
    ss('syncing','查找云端...');
    const remote = await loadRemote(u);
    if (remote&&remote.length>0) { assets=remote; saveSilent(); render(); ss('synced','已从云端加载'); }
    else { render(); ss('error','暂无数据 · 有恢复码？'); document.getElementById('syncRecovery').onclick=showRecoveryInput; }
  }
  if (assets.length>0) document.getElementById('syncRecovery').onclick=showRecoveryInfo;
}
document.getElementById('fabBtn').addEventListener('click',()=>openModal());
init();
</script>
</body>
